            {buildLogic.map(l=>(
              <div key={l.title} style={{background:"#0f0f18",border:"1px solid #1e1e2a",borderRadius:6,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:600,color:"#E8920A",marginBottom:4}}>{l.title}</div>
                <div style={{fontSize:11,color:"#999",lineHeight:1.7}}>{l.text}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* PHASE TABS */}
      <div style={{display:"flex",overflowX:"auto",borderBottom:"1px solid #1a1a24",background:"#0e0e14"}}>
        {phases.map((p,i)=>(
          <button key={p.id} onClick={()=>{setActivePhase(i);setActiveDay(0);}} style={{flexShrink:0,padding:"10px 14px",border:"none",borderBottom:`2px solid ${activePhase===i?p.col:"transparent"}`,background:activePhase===i?`${p.col}12`:"transparent",color:activePhase===i?p.col:"#555",textAlign:"left"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,letterSpacing:".1em",fontWeight:700}}>{p.name}</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:700,color:activePhase===i?"#E0D8CC":"#444",marginTop:1}}>{p.label}</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"#3a3a44",marginTop:1}}>{p.weeks}</div>
            {p.competition && <div style={{fontSize:9,color:p.col,marginTop:4,fontWeight:600}}>🏆 Wk {p.competition.week}</div>}
          </button>
        ))}
      </div>

      {/* PHASE OVERVIEW */}
      <div style={{padding:"14px 16px",borderBottom:"1px solid #1a1a24",background:"#0e0e16"}}>
        <div style={{fontSize:12,color:"#aaa",fontStyle:"italic",borderLeft:`3px solid ${col}`,paddingLeft:10,marginBottom:8}}>"{phase.analogy}"</div>
        <div style={{fontSize:12,color:"#bbb",lineHeight:1.75,marginBottom:10}}>{phase.overview}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
          {phase.keyTargets.map(t=><div key={t} style={{fontSize:10,padding:"3px 8px",background:`${col}0e`,border:`1px solid ${col}20`,borderRadius:4,color:"#bbb"}}>{t}</div>)}
        </div>
        {phase.competition && (
          <div style={{background:`${col}0e`,border:`1px solid ${col}30`,borderRadius:7,padding:"10px 12px",marginBottom:10}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,color:col,fontWeight:700,letterSpacing:".1em",marginBottom:5}}>🏆 TARGET — WEEK {phase.competition.week}: {phase.competition.name}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"3px 14px",marginBottom:6}}>
              {phase.competition.targets.map(t=><div key={t} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#d0c0a0"}}>{t}</div>)}
            </div>
            {phase.competition.note && <div style={{fontSize:10,color:"#777"}}>{phase.competition.note}</div>}
          </div>
        )}
        <div style={{background:"#14141e",borderRadius:5,padding:"8px 10px"}}>
          <span style={{fontSize:9,letterSpacing:".12em",color:"#555"}}>NUTRITION: </span>
          <span style={{fontSize:11,color:"#999"}}>{phase.nutrition}</span>
        </div>
      </div>

      {/* DAY SELECTOR */}
      <div style={{display:"flex",gap:5,overflowX:"auto",padding:"10px 16px",background:"#0A0A0E",borderBottom:"1px solid #1a1a24"}}>
        {phase.days.map((d,i)=>(
          <button key={d.id} onClick={()=>setActiveDay(i)} style={{flexShrink:0,padding:"6px 12px",border:`1px solid ${activeDay===i?col:"#252530"}`,background:activeDay===i?`${col}15`:"#111116",color:activeDay===i?col:"#666",borderRadius:5,fontSize:10,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:".05em"}}>DAY {d.id}</button>
        ))}
      </div>

      {/* DAY DETAIL */}
      <div style={{padding:"14px 16px 48px"}}>
        <div style={{marginBottom:12}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,color:col,letterSpacing:".04em"}}>{day.label}</div>
          <div style={{fontSize:11,color:"#888",marginTop:2}}>{day.sub}</div>
        </div>
        <div style={{overflowX:"auto",borderRadius:8,border:"1px solid #1e1e28"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:520}}>
            <thead>
              <tr style={{background:"#13131c",borderBottom:"1px solid #1e1e28"}}>
                {["Exercise","Protocol / Weekly Progression","Notes & Coaching Cues"].map(h=>(
                  <th key={h} style={{textAlign:"left",padding:"8px 10px",fontSize:9,letterSpacing:".12em",color:"#555",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {day.exercises.map((ex,i)=>{
                const isPrimary = ex.name.includes("★★★");
                const isImportant = ex.name.includes("★") || ex.name.includes("[ADDED") || ex.name.includes("[NON-NEG") || ex.name.includes("[MANDATORY");
                return (
                  <tr key={i} style={{borderBottom:"1px solid #16161e",background:i%2===1?"#0d0d16":"transparent"}}>
                    <td style={{padding:"10px 10px",fontWeight:isPrimary?800:isImportant?700:500,color:isPrimary?col:isImportant?`${col}BB`:"#D4C8B8",fontSize:isPrimary?13:12,lineHeight:1.4,verticalAlign:"top",whiteSpace:"nowrap",borderLeft:isPrimary?`3px solid ${col}`:"3px solid transparent"}}>{ex.name}</td>
                    <td style={{padding:"10px 10px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#A09878",lineHeight:1.7,verticalAlign:"top",maxWidth:280}}>{ex.protocol}</td>
                    <td style={{padding:"10px 10px",fontSize:11,color:"#706050",lineHeight:1.7,verticalAlign:"top",maxWidth:240}}>{ex.note}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {activeDay === 5 && activePhase === 2 && (
          <div style={{marginTop:14,background:"#0e1812",border:"1px solid #20884A30",borderRadius:8,padding:"12px 14px"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,letterSpacing:".15em",color:"#20884A",marginBottom:8,fontWeight:700}}>HYROX COURSE REFERENCE (Full Race)</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"4px 20px"}}>
              {["1km Run → 1000m SkiErg","1km Run → 50m Sled Push (152kg men)","1km Run → 50m Sled Pull (103kg men)","1km Run → 80m Burpee Broad Jumps","1km Run → 1000m Row","1km Run → 200m Farmer's Carry (24kg each)","1km Run → 100m Sandbag Lunges (20kg)","1km Run → 100 Wall Balls (6kg/9ft)"].map((s,i)=>(
                <div key={i} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#7a9a7a"}}>Station {i+1}: {s}</div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
